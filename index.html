document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"53175167-c937-4ada-960e-5640c40b1d0c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"7b5f13a6-0b9c-4054-94e6-f9f5d85a94a9\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"f85a8c93-5beb-49a7-92b5-c683c5585b43\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"5392267a-91a0-46f4-86b7-88878ee72918\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"53175167-c937-4ada-960e-5640c40b1d0c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <script src=\"79f0a052-f42b-42a4-8383-42efe90cee13\"><\u002Fscript>\n  <script src=\"dd925864-ef68-472a-85c4-c06170140565\"><\u002Fscript>\n  <script src=\"066bf964-f2ff-4600-a5d3-df3504e484db\"><\u002Fscript>\n  <style>\n    *{box-sizing:border-box;}\n    html,body{margin:0;padding:0;height:100%;}\n    button{font-family:inherit;cursor:pointer;border:none;background:none;}\n    input,select{font-family:inherit;}\n    input:focus,select:focus{outline:none;}\n    ::-webkit-scrollbar{width:0;height:0;}\n    @keyframes pkfade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}\n    .pk-anim{animation:pkfade .22s ease;}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex;justify-content:center;min-height:100vh;background:#E6E5E0;font-family:'Hanken Grotesk',system-ui,sans-serif;color:#20201E;-webkit-font-smoothing:antialiased;\">\n<div style=\"width:100%;max-width:468px;min-height:100vh;background:#F4F3EF;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.1);overflow:hidden;\">\n\n  <!-- SETUP REQUIRED -->\n  <sc-if value=\"{{ isSetup }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;\">\n      <div style=\"font-size:34px;margin-bottom:16px;\">⚙️<\u002Fdiv>\n      <div style=\"font-size:20px;font-weight:800;margin-bottom:10px;\">Firebase einrichten<\u002Fdiv>\n      <div style=\"font-size:14px;color:#6E6B63;line-height:1.7;margin-bottom:24px;max-width:320px;\">Um die App zu nutzen, musst du ein kostenloses Firebase-Projekt erstellen und die Konfiguration eintragen.<\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #E7E5DF;border-radius:16px;padding:20px;width:100%;max-width:340px;text-align:left;\">\n        <div style=\"font-size:13px;font-weight:700;color:#20201E;margin-bottom:12px;\">So geht's:<\u002Fdiv>\n        <div style=\"font-size:13px;color:#56544D;line-height:1.8;\">\n          1. console.firebase.google.com öffnen<br>\n          2. Neues Projekt erstellen<br>\n          3. Authentication → Email/Passwort aktivieren<br>\n          4. Realtime Database erstellen (Europe)<br>\n          5. Projekteinstellungen → Web-App hinzufügen<br>\n          6. Den Config-Code in die App eintragen\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- LOADING -->\n  <sc-if value=\"{{ isLoading }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;\">\n      <div style=\"font-size:28px;font-weight:800;letter-spacing:-.02em;\">Contenti Contanti<\u002Fdiv>\n      <div style=\"font-size:13px;color:#A6A39B;\">Laden…<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- AUTH -->\n  <sc-if value=\"{{ isAuth }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"pk-anim\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;\">\n      <div style=\"text-align:center;margin-bottom:44px;\">\n        <div style=\"font-size:34px;font-weight:800;letter-spacing:-.03em;margin-bottom:6px;\">Contenti Contanti<\u002Fdiv>\n        <div style=\"font-size:14px;color:#8A8880;\">Gemeinsame Ausgaben tracken<\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ authStep === 'choose' }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px;\">\n          <button onclick=\"{{ goSignup }}\" style=\"width:100%;padding:16px;border-radius:14px;font-size:15px;font-weight:700;color:#fff;background:#2F6E6A;\">Neues Konto erstellen<\u002Fbutton>\n          <button onclick=\"{{ goLoginForm }}\" style=\"width:100%;padding:16px;border-radius:14px;font-size:15px;font-weight:700;color:#20201E;background:#fff;border:1px solid #DDD9D1;\">Anmelden<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ authStep === 'signup' }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"pk-anim\" style=\"width:100%;max-width:340px;\">\n          <div style=\"font-size:20px;font-weight:800;margin-bottom:20px;\">Konto erstellen<\u002Fdiv>\n          <label style=\"display:block;font-size:12px;font-weight:700;color:#8A8880;margin-bottom:6px;\">Email<\u002Flabel>\n          <input type=\"email\" value=\"{{ authEmail }}\" onchange=\"{{ onAuthEmail }}\" placeholder=\"deine@email.com\" style=\"width:100%;font-size:15px;color:#20201E;background:#fff;border:1px solid #DDD9D1;border-radius:11px;padding:12px 13px;margin-bottom:14px;\">\n          <label style=\"display:block;font-size:12px;font-weight:700;color:#8A8880;margin-bottom:6px;\">Passwort<\u002Flabel>\n          <input type=\"password\" value=\"{{ authPassword }}\" onchange=\"{{ onAuthPassword }}\" placeholder=\"Min. 6 Zeichen\" style=\"width:100%;font-size:15px;color:#20201E;background:#fff;border:1px solid #DDD9D1;border-radius:11px;padding:12px 13px;margin-bottom:18px;\">\n          <sc-if value=\"{{ authError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:11px 13px;background:#FFF1EE;border:1px solid #F0C8BC;border-radius:10px;font-size:13px;color:#B0503A;margin-bottom:14px;\">{{ authError }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <button onclick=\"{{ doSignup }}\" style=\"width:100%;padding:15px;border-radius:13px;font-size:15px;font-weight:700;color:#fff;background:#2F6E6A;margin-bottom:10px;\">Konto erstellen<\u002Fbutton>\n          <button onclick=\"{{ goChoose }}\" style=\"width:100%;padding:14px;border-radius:13px;font-size:14px;font-weight:600;color:#6E6B63;background:#fff;border:1px solid #DDD9D1;\">Zurück<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ authStep === 'login' }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"pk-anim\" style=\"width:100%;max-width:340px;\">\n          <div style=\"font-size:20px;font-weight:800;margin-bottom:20px;\">Anmelden<\u002Fdiv>\n          <label style=\"display:block;font-size:12px;font-weight:700;color:#8A8880;margin-bottom:6px;\">Email<\u002Flabel>\n          <input type=\"email\" value=\"{{ authEmail }}\" onchange=\"{{ onAuthEmail }}\" placeholder=\"deine@email.com\" style=\"width:100%;font-size:15px;color:#20201E;background:#fff;border:1px solid #DDD9D1;border-radius:11px;padding:12px 13px;margin-bottom:14px;\">\n          <label style=\"display:block;font-size:12px;font-weight:700;color:#8A8880;margin-bottom:6px;\">Passwort<\u002Flabel>\n          <input type=\"password\" value=\"{{ authPassword }}\" onchange=\"{{ onAuthPassword }}\" placeholder=\"Passwort\" style=\"width:100%;font-size:15px;color:#20201E;background:#fff;border:1px solid #DDD9D1;border-radius:11px;padding:12px 13px;margin-bottom:18px;\">\n          <sc-if value=\"{{ authError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:11px 13px;background:#FFF1EE;border:1px solid #F0C8BC;border-radius:10px;font-size:13px;color:#B0503A;margin-bottom:14px;\">{{ authError }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <button onclick=\"{{ doLogin }}\" style=\"width:100%;padding:15px;border-radius:13px;font-size:15px;font-weight:700;color:#fff;background:#2F6E6A;margin-bottom:10px;\">Anmelden<\u002Fbutton>\n          <button onclick=\"{{ goChoose }}\" style=\"width:100%;padding:14px;border-radius:13px;font-size:14px;font-weight:600;color:#6E6B63;background:#fff;border:1px solid #DDD9D1;\">Zurück<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- GROUP SELECT -->\n  <sc-if value=\"{{ isGroupSelect }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"pk-anim\" style=\"flex:1;display:flex;flex-direction:column;padding:32px 20px 24px;\">\n      <div style=\"margin-bottom:22px;\">\n        <div style=\"font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;\">Meine Gruppen<\u002Fdiv>\n        <div style=\"font-size:13px;color:#8A8880;\">Wähle eine Gruppe oder erstelle eine neue<\u002Fdiv>\n      <\u00 800;margin-bottom:22px;\">Neue Gruppe<\u002Fdiv>\n      <div style=\"flex:1;\">\n        <label style=\"display:block;font-size:12px;font-weight:700;color:#8A8880;margin-bottom:6px;\">Gruppenname<\u002Flabel>\n        <input type=\"text\" value=\"{{ newGroupName }}\" onchange=\"{{ onNewGroupName }}\" placeholder=\"z.B. Jan und Maria\" style=\"width:100%;font-size:15px;color:#20201E;background:#fff;border:1px solid #DDD9D1;border-radius:11px;padding:12px 13px;margin-bottom:16px;\">\n        <label style=\"display:block;font-size:12px;font-weight:700;color:#8A8880;margin-bottom:6px;\">Dein Name<\u002Flabel>\n        <input type=\"text\" value=\"{{ newGroupPersonA }}\" onchange=\"{{ onNewGroupPersonA }}\" placeholder=\"Dein Name\" style=\"width:100%;font-size:15px;color:#20201E;background:#fff;border:1px solid #DDD9D1;border-radius:11px;padding:12px 13px;margin-bottom:16px;\">\n        <label style=\"display:block;font-size:12px;font-weight:700;color:#8A8880;margin-bottom:6px;\">Name des Partners<\u002Flabel>\n        <input type=\"text\" value=\"{{ newGroupPersonB }}\" onchange=\"{{ onNewGroupPersonB }}\" placeholder=\"Partnername\" style=\"width:100%;font-size:15px;color:#20201E;background:#fff;border:1px solid #DDD9D1;border-radius:11px;padding:12px 13px;\">\n      <\u002Fdiv>\n      <button onclick=\"{{ doCreateGroup }}\" style=\"width:100%;padding:15px;border-radius:13px;font-size:15px;font-weight:700;color:#fff;background:{{ canCreateGroup ? '#2F6E6A' : '#C8C5BC' }};margin-top:24px;\">Gruppe erstellen<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- GROUP CREATED — show shareable code -->\n  <sc-if value=\"{{ isGroupCreated }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"pk-anim\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;\">\n      <div style=\"font-size:44px;margin-bottom:14px;\">🎉<\u002Fdiv>\n      <div style=\"font-size:22px;font-weight:800;margin-botto \"1:611108423445:web:b8101446a699ca931e4b1c\"\n    };\n    try {\n      if (!firebase.apps.length) {\n        firebase.initializeApp(cfg);\n      }\n    } catch(e) { /* already initialized */ }\n\n    firebase.auth().onAuthStateChanged(u => {\n      if (u) {\n        this.setState({ user: u, screen: 'group' });\n        this.loadUserGroups(u.uid);\n      } else {\n        this.setState({ user: null, screen: 'auth', authStep: 'choose', groupId: null, expenses: [] });\n      }\n    });\n  }\n\n  loadUserGroups(uid) {\n    firebase.database().ref('users/' + uid + '/groups').on('value', snap => {\n      const data = snap.val() || {};\n      const groups = Object.entries(data).map(([gid, g]) => ({\n        id: gid,\n        name: g.name,\n        members: (g.memberNames || []).join(' & '),\n        onSelect: () => this.selectGroup(gid)\n      }));\n      this.setState({ userGroups: groups });\n    });\n  }\n\n  selectGroup(gid) {\n    firebase.database().ref('groups/' + gid).once('value', snap => {\n      const g = snap.val();\n      if (!g) return;\n      this.setState({\n        groupId: gid, groupName: g.name,\n        nameA: g.nameA, nameB: g.nameB,\n        screen: 'app', tab: 'dash', expenses: []\n      });\n      this.listenExpenses(gid);\n    });\n  }\n\n  listenExpenses(gid) {\n    firebase.database().ref('groups/' + gid + '/expenses').on('value', snap => {\n      const data = snap.val() || {};\n      this.setState({ expenses: Object.values(data) });\n    });\n  }\n\n  doSignup = async () => {\n    const { authEmail, authPassword } = this.state;\n    this.setState({ authError: '' });\n    try {\n      await firebase.auth().createUserWithEmailAndPassword(authEmail.trim(), authPassword);\n    } catch(e) {\n      let msg = e.message;\n      if (e.code === 'auth/email-already-in-use') msg = 'Diese Email wird bereits verwendet.';\n      else if (e.code === 'auth/invalid-email') msg = 'Ungueltige Email-Adresse.';\n      else if (e.code === 'auth/weak-password') msg = 'Passwort zu schwach (min. 6 Zeichen).';\n      this.setState({ authError: msg });\n    }\n  };\n\n  doLogin = async () => {\n    const { authEmail, authPassword } = this.state;\n    this.setState({ authError: '' });\n    try {\n      await firebase.auth().signInWithEmailAndPassword(authEmail.trim(), authPassword);\n    } catch(e) {\n      let msg = e.message;\n      if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') msg = 'Email oder Passwort falsch.';\n      else if (e.code === 'auth/invalid-email') msg = 'Ungueltige Email-Adresse.';\n      this.setState({ authError: msg });\n    }\n  };\n\n  doLogout = () => firebase.auth().signOut();\n\n  doCreateGroup = async () => {\n    const { newGroupName, newGroupPersonA, newGroupPersonB, user } = this.state;\n    if (!newGroupName || !newGroupPersonA || !newGroupPersonB) return;\n    const db = firebase.database();\n    const ref = db.ref('groups').push();\n    const gid = ref.key;\n    await ref.set({\n      name: newGroupName,\n      nameA: newGroupPersonA,\n      nameB: newGroupPersonB,\n      memberNames: [newGroupPersonA]\n    });\n    await db.ref('users/' + user.uid + '/groups/' + gid).set({\n      name: newGroupName,\n      memberNames: [newGroupPersonA]\n    });\n    this.setState({ newGroupId: gid, screen: 'groupcreated', copyLabel: 'Code kopieren' });\n    this.loadUserGroups(user.uid);\n  };\n\n  doJoinGroup = async () => {\n    const { joinGroupKey, joinPersonName, user } = this.state;\n    const key = (joinGroupKey || '').trim();\n    if (!key || !joinPersonName) return;\n    this.setState({ joinError: '' });\n    try {\n      const db = firebase.database();\n      const snap = await db.ref('groups/' + key).once('value');\n      if (!snap.exists()) {\n        this.setState({ joinError: 'Gruppe nicht gefunden. Bitte Code pruefen.' });\n        return;\n      }\n      const g = snap.val();\n      const members = g.memberNames || [];\n      if (!members.includes(joinPersonName)) members.push(joinPersonName);\n      await db.ref('groups/' + key + '/memberNames').set(members);\n      await db.ref('users/' + user.uid + '/groups/' + key).set({\n        name: g.name,\n        memberNames: members\n      });\n      this.setState({ joinGroupKey: '', joinPersonName: '', joinError: '' });\n      this.selectGroup(key);\n    } catch(e) {\n      this.setState({ joinError: 'Fehler beim Beitreten: ' + e.message });\n    }\n  };\n\n  saveExpense = async () => {\n    const { draftAmount, draftDate, draftCat, draftPaidBy, groupId } = this.state;\n    const amt = parseFloat((draftAmount || '').replace(',', '.'));\n    if (!amt || amt <= 0 || !groupId) return;\n    const ref = firebase.database().ref('groups/' + groupId + '/expenses').push();\n    await ref.set({\n      id: ref.key,\n      amount: amt,\n      date: draftDate,\n      category: draftCat,\n      paidBy: draftPaidBy\n    });\n    this.setState({\n      draftAmount: '',\n      draftDate: new Date().toISOString().slice(0,10),\n      draftCat: 'lebensmittel',\n      draftPaidBy: 'A',\n      tab: 'dash',\n      activeMonth: draftDate.slice(0,7)\n    });\n  };\n\n  fmt(n) {\n    const r = Math.round((n + Number.EPSILON) * 100) / 100;\n    return r.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';\n  }\n\n  renderVals() {\n    const s = this.state;\n    const screen = s.screen;\n\n    const isSetup        = screen === 'setup';\n    const isLoading      = screen === 'loading';\n    const isAuth         = screen === 'auth';\n    const isGroupSelect  = screen === 'group';\n    const isCreateGroup  = screen === 'creategroup';\n    const isGroupCreated = screen === 'groupcreated';\n    const isJoinGroup    = screen === 'joingroup';\n    const isApp          = screen === 'app';\n\n    const [yr, mo] = s.activeMonth.split('-').map(Number);\n    const monthLabel = this.MONTHS[mo - 1] + ' ' + yr;\n\n    const filtered = s.expenses.filter(e => e.date && e.date.slice(0,7) === s.activeMonth);\n    let total = 0, aPaidN = 0, bPaidN = 0;\n    filtered.forEach(e => {\n      const a = +e.amount;\n      total += a;\n      if (e.paidBy === 'A') aPaidN += a; else bPaidN += a;\n    });\n\n    const aShare = total / 2;\n    const netA = aPaidN - aShare;\n    const netB = bPaidN - aShare;\n    let owerKey = null, oweAmt = 0;\n    if (netA < -0.005) { owerKey = 'A'; oweAmt = -netA; }\n    else if (netB < -0.005) { owerKey = 'B'; oweAmt = -netB; }\n    const isBalanced = owerKey === null;\n\n    const catChips = this.CATS.map(c => ({\n      label: c.label, dot: c.dot,\n      style: s.draftCat === c.key\n        ? 'padding:8px 12px;border-radius:10px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;background:#20201E;color:#fff;border:1px solid #20201E;'\n        : 'padding:8px 12px;border-radius:10px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;background:#fff;color:#4A483F;border:1px solid #E2E0DA;',\n      onPick: () => this.setState({ draftCat: c.key })\n    }));\n\n    const pBase = 'padding:13px;border-radius:12px;font-size:14px;font-weight:700;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';\n    const paidAStyle = s.draftPaidBy === 'A'\n      ? pBase + 'background:#2F7E86;color:#fff;border:1px solid #2F7E86;'\n      : pBase + 'background:#fff;color:#4A483F;border:1px solid #E2E0DA;';\n    const paidBStyle = s.draftPaidBy === 'B'\n      ? pBase + 'background:#B0703F;color:#fff;border:1px solid #B0703F;'\n      : pBase + 'background:#fff;color:#4A483F;border:1px solid #E2E0DA;';\n\n    const listItems = [...filtered].reverse().map(e => {\n      const p = e.date.split('-');\n      return {\n        dot: this.CATS.find(c => c.key === e.category)?.dot || '#999',\n        title: this.CATS.find(c => c.key === e.category)?.label || 'Sonstiges',\n        dateLabel: p[2] + '.' + p[1] + '.',\n        paidByName: e.paidBy === 'A' ? s.nameA : s.nameB,\n        paidByColor: e.paidBy === 'A' ? '#2F7E86' : '#B0703F',\n        amtLabel: this.fmt(+e.amount)\n      };\n    });\n\n    const owerName  = owerKey === 'A' ? (s.nameA || 'A') : (s.nameB || 'B');\n    const oweeName  = owerKey === 'A' ? (s.nameB || 'B') : (s.nameA || 'A');\n\n    return {\n      isSetup, isLoading, isAuth, authStep: s.authStep,\n      authEmail: s.authEmail, authPassword: s.authPassword, authError: s.authError,\n      onAuthEmail: e => this.setState({ authEmail: e.target.value }),\n      onAuthPassword: e => this.setState({ authPassword: e.target.value }),\n      goChoose: () => this.setState({ authStep: 'choose', authError: '' }),\n      goSignup: () => this.setState({ authStep: 'signup', authError: '' }),\n      goLoginForm: () => this.setState({ authStep: 'login', authError: '' }),\n      doSignup: this.doSignup,\n      doLogin: this.doLogin,\n\n      isGroupSelect, noGroups: s.userGroups.length === 0, userGroups: s.userGroups,\n      startNewGroup: () => this.setState({ screen: 'creategroup', newGroupName: '', newGroupPersonA: '', newGroupPersonB: '' }),\n      goJoinGroup: () => this.setState({ screen: 'joingroup', joinGroupKey: '', joinPersonName: '', joinError: '' }),\n      doLogout: this.doLogout,\n\n      isCreateGroup,\n      newGroupName: s.newGroupName, newGroupPersonA: s.newGroupPersonA, newGroupPersonB: s.newGroupPersonB,\n      onNewGroupName: e => this.setState({ newGroupName: e.target.value }),\n      onNewGroupPersonA: e => this.setState({ newGroupPersonA: e.target.value }),\n      onNewGroupPersonB: e => this.setState({ newGroupPersonB: e.target.value }),\n      canCreateGroup: !!(s.newGroupName && s.newGroupPersonA && s.newGroupPersonB),\n      doCreateGroup: this.doCreateGroup,\n\n      isGroupCreated, newGroupId: s.newGroupId, copyLabel: s.copyLabel,\n      copyGroupCode: () => {\n        navigator.clipboard.writeText(s.newGroupId).catch(() => {});\n        this.setState({ copyLabel: 'Kopiert!' });\n        setTimeout(() => this.setState({ copyLabel: 'Code kopieren' }), 2500);\n      },\n      goToApp: () => this.selectGroup(s.newGroupId),\n\n      isJoinGroup,\n      joinGroupKey: s.joinGroupKey, joinPersonName: s.joinPersonName, joinError: s.joinError,\n      onJoinGroupKey: e => this.setState({ joinGroupKey: e.target.value }),\n      onJoinPersonName: e => this.setState({ joinPersonName: e.target.value }),\n      canJoinGroup: !!(s.joinGroupKey && s.joinPersonName),\n      doJoinGroup: this.doJoinGroup,\n\n      goGroupSelect: () => this.setState({ screen: 'group' }),\n\n      isApp, tab: s.tab, groupName: s.groupName,\n      nameA: s.nameA || 'Person A', nameB: s.nameB || 'Person B',\n      monthLabel,\n\n      isBalanced, isNotBalanced: !isBalanced,\n      balanceLead: owerName + ' schuldet ' + oweeName,\n      balanceAmt: this.fmt(oweAmt),\n      aPaid: this.fmt(aPaidN), bPaid: this.fmt(bPaidN), total: this.fmt(total),\n\n      listItems, listEmpty: listItems.length === 0,\n\n      draftAmount: s.draftAmount, draftDate: s.draftDate,\n      onAmount: e => this.setState({ draftAmount: e.target.value }),\n      onDate: e => this.setState({ draftDate: e.target.value }),\n      catChips, paidAStyle, paidBStyle,\n      pickA: () => this.setState({ draftPaidBy: 'A' }),\n      pickB: () => this.setState({ draftPaidBy: 'B' }),\n      saveExpense: this.saveExpense,\n      cancelAdd: () => this.setState({ tab: 'dash' }),\n\n      navDash: () => this.setState({ tab: 'dash' }),\n      navAdd:  () => this.setState({ tab: 'add' }),\n      navList: () => this.setState({ tab: 'list' }),\n\n      prevMonth: () => {\n        const dt = new Date(yr, mo - 2, 1);\n        this.setState({ activeMonth: dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') });\n      },\n      nextMonth: () => {\n        const dt = new Date(yr, mo, 1);\n        this.setState({ activeMonth: dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') });\n      }\n    };\n  }\n}\n<\u00
